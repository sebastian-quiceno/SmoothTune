spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/smoothtune
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # opciones: none, validate, update, create, create-drop
    show-sql: true       # muestra las consultas en consola
    properties:
      hibernate:
        format_sql: true # formatea las consultas para mayor legibilidad

  application:
    name: smoothtune

